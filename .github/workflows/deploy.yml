name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - app.py
      - config.py
      - templates/**
      - static/**
      - Dockerfile
      - requirements.txt
      - docker-compose.yml

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Staging Deployment
        run: |
          echo "Deploying to STAGING"
          echo "IMAGE=sakila-app:staging"
          docker build -t sakila-app:staging .
          echo "STAGING DEPLOYMENT SUCCESS" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Production Deployment
        run: |
          echo "Deploying to PRODUCTION"
          echo "IMAGE=sakila-app:production"
          docker build -t sakila-app:production .

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Production Summary
        run: |
          echo "PRODUCTION DEPLOYMENT SUCCESS" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: echo "Slack notification: Production deployment successful"