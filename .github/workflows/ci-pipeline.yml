name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.9
  IMAGE_NAME: sakila-app
  PYTHONPATH: .

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install flake8

      - run: flake8 --max-line-length=120 --ignore=E501,W503 .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -r requirements.txt

      - run: pip install pytest pymysql

      - run: sleep 25

      - run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip mysql-client
          wget https://downloads.mysql.com/docs/sakila-db.zip
          unzip sakila-db.zip
          mysql -h 127.0.0.1 -uroot -proot sakila < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -uroot -proot sakila < sakila-db/sakila-data.sql

      - env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DB: sakila
        run: pytest -v tests/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - run: docker images

      - run: |
          docker run -d -p 5000:5000 --name sakila_test ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl -f http://localhost:5000 || echo "App not responding but build passed"

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: .